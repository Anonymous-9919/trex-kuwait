      - heading "Car Detailing — FAQs" [level=2] [ref=e190]
    - generic [ref=e191]:
      - generic [ref=e192]:
        - button "What's the difference between a car wash and detailing? " [ref=e193] [cursor=pointer]:
          - generic [ref=e194]: What's the difference between a car wash and detailing?
          - generic [ref=e195]: 
        - paragraph [ref=e196]: A standard car wash is a surface-level cleaning. Detailing is a comprehensive service that includes deep cleaning, paint correction, protection, and restoration of both interior and exterior surfaces. Detailing addresses the details that a regular wash misses.
      - generic [ref=e197]:
        - button "How often should I detail my car? " [ref=e198] [cursor=pointer]:
          - generic [ref=e199]: How often should I detail my car?
          - generic [ref=e200]: 
        - paragraph [ref=e201]: For most vehicles, a full detail every 6-12 months is recommended. However, if you want to maintain peak condition, interior detailing every 3-4 months and exterior detailing every 6 months is ideal. We can recommend a schedule based on your driving habits and environment.
      - generic [ref=e202]:
        - button "Can you remove smoke odor completely? " [ref=e203] [cursor=pointer]:
          - generic [ref=e204]: Can you remove smoke odor completely?
          - generic [ref=e205]: 
        - paragraph [ref=e206]: In most cases, yes. Our multi-stage smoke odor removal process is highly effective. The success rate depends on factors like how long the smoke has been present and whether it has penetrated deep into foam and padding. We provide a thorough assessment before any treatment.
      - generic [ref=e207]:
        - button "How long does a full detail take? " [ref=e208] [cursor=pointer]:
          - generic [ref=e209]: How long does a full detail take?
          - generic [ref=e210]: 
        - paragraph [ref=e211]: A full exterior and interior detail typically takes 1-2 days depending on the vehicle's condition and services selected. Paint correction adds additional time. We'll provide a timeline during booking.
      - generic [ref=e212]:
        - button "Do you use steam cleaning for interiors? " [ref=e213] [cursor=pointer]:
          - generic [ref=e214]: Do you use steam cleaning for interiors?
          - generic [ref=e215]: 
        - paragraph [ref=e216]: Yes. We use professional steam cleaning equipment to sanitize and deep clean interior surfaces without harsh chemicals. Steam effectively removes dirt, kills bacteria, and revitalizes fabrics and leather.
